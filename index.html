<div class="modal fade" id="startModal" tabindex="-1" role="dialog">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h4 class="modal-title" id="startModalTitle">Start</h4>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Schliessen"></button>
      </div>
      <div class="modal-body p-0">
        <div class="poi-image-box">
          <img id="start-image" src="" alt="" />
        </div>
        <div class="poi-content-area px-3 pt-2 pb-3">
          <button id="start-play-btn" class="poi-play-btn" aria-label="Audio abspielen">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <polygon id="start-play-icon" points="6,4 20,12 6,20"/>
              <rect id="start-pause-bar-1" class="pause-bar" x="5" y="4" width="4" height="16"/>
              <rect id="start-pause-bar-2" class="pause-bar" x="15" y="4" width="4" height="16"/>
            </svg>
          </button>
          <p id="start-text"></p>
          <p class="poi-ki-hint" id="start-ki-hint"></p>
        </div>
        <audio id="start-audio" preload="none"></audio>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-primary" id="start-tour-btn">
          <span id="startTourBtnLabel">Tour starten</span>
        </button>
      </div>
    </div><!-- /.modal-content -->
  </div><!-- /.modal-dialog -->
</div><!-- /.modal -->
